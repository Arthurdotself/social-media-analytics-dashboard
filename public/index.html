<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Home Monitor</title>

  <style>
    body { font-family: system-ui, -apple-system, Arial; padding: 24px; background:#f5f5f5; }
    h1 { margin: 0 0 6px; }
    .muted { color: #666; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 18px; }
    .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .big { font-size: 34px; font-weight: 800; margin: 8px 0; }
    button, .link-btn { padding: 10px 16px; border-radius: 10px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: 600; text-decoration:none; color:#111; display:inline-block; }
    .err { margin-top: 10px; padding: 10px 12px; border-radius: 10px; background: #fff3f3; border: 1px solid #ffcaca; color: #8b0000; font-size: 13px; }
  </style>
</head>

<body>
  <h1>Home Monitor</h1>
  <div class="muted">Quick monitoring view with follower counts only.</div>

  <div style="margin-top:14px;">
    <button id="refreshBtn">Refresh now</button>
    <a class="link-btn" style="margin-left:10px;" href="/comparison.html">Open Comparison Details</a>
    <span class="muted" style="margin-left:10px;">Auto-refresh: 1 hour</span>
  </div>

  <div class="muted" style="margin-top:6px;">
    Last updated: <span id="lastUpdated">-</span>
    <span id="cacheTag"></span>
  </div>
  <div id="errorBox" class="err" style="display:none;"></div>

  <div class="grid">
    <div class="card">
      <h2>Instagram</h2>
      <div class="big" id="igFollowers">-</div>
      <div class="muted" id="igName"></div>
    </div>

    <div class="card">
      <h2>Facebook</h2>
      <div class="big" id="fbFollowers">-</div>
      <div class="muted" id="fbName"></div>
    </div>

  </div>

<script>
  const fmt = (n) => (typeof n === "number" ? n.toLocaleString() : "N/A");

  async function load() {
    const data = await fetch("/api/meta/summary?week_offset=0").then(r => r.json());

    if (data.error) {
      document.getElementById("cacheTag").textContent = "";
      document.getElementById("lastUpdated").textContent = "Error";
      const errorBox = document.getElementById("errorBox");
      errorBox.style.display = "block";
      errorBox.textContent = data.action ? `${data.error} ${data.action}` : data.error;
      return;
    }
    document.getElementById("errorBox").style.display = "none";

    document.getElementById("lastUpdated").textContent = new Date().toLocaleTimeString();
    document.getElementById("cacheTag").textContent = data.cached ? " (cached)" : "";

    const ig = data.instagram || {};
    document.getElementById("igFollowers").textContent = fmt(ig.followers_now);
    document.getElementById("igName").textContent = ig.username ? `@${ig.username}` : "";

    const fb = data.facebook || {};
    const hasFb = data.facebook !== null;
    document.getElementById("fbFollowers").textContent = fmt(fb.followers_now);
    document.getElementById("fbName").textContent = hasFb ? (fb.page_name || "") : "Unavailable with current token/permissions";
  }

  document.getElementById("refreshBtn").onclick = load;

  load();
  setInterval(load, 3600000);
</script>

</body>
</html>
